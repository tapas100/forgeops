# =============================================================================
# ForgeOps Platform — Nginx Main Configuration
# /etc/nginx/nginx.conf
# Tuned for Oracle Cloud Always Free Tier (1 OCPU / 1 GB RAM)
# =============================================================================

user  www-data;
worker_processes  auto;          # Scales to available CPUs
worker_rlimit_nofile 8192;       # Max open files per worker

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;    # Conservative limit for free tier
    use                 epoll;
    multi_accept        on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct=$upstream_connect_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Security headers (applied globally) ──────────────────────────────────
    server_tokens  off;                          # Hide Nginx version
    add_header X-Frame-Options         SAMEORIGIN always;
    add_header X-Content-Type-Options  nosniff   always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size     32m;   # Allow Jenkins file uploads
    client_body_timeout      30s;
    client_header_timeout    30s;
    send_timeout             30s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API requests
    limit_req_zone  $binary_remote_addr zone=api:10m       rate=30r/m;
    # Jenkins webhook endpoint (GitHub sends many webhooks quickly)
    limit_req_zone  $binary_remote_addr zone=webhooks:10m  rate=60r/m;

    # ── SSL settings (referenced by site configs) ─────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Include site configs ──────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
