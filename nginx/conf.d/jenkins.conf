# =============================================================================
# ForgeOps Platform — Nginx Jenkins Site Configuration
# /etc/nginx/conf.d/jenkins.conf
#
# IMPORTANT: Replace YOUR_DOMAIN_HERE with your actual domain before use.
#            Run: sudo sed -i 's/YOUR_DOMAIN_HERE/ci.example.com/g' jenkins.conf
# =============================================================================

# ── Upstream: Jenkins container (Podman rootless, bound to localhost) ─────────
upstream jenkins_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen       80;
    listen       [::]:80;
    server_name  YOUR_DOMAIN_HERE;

    # Let's Encrypt challenge (certbot uses this path)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Main Jenkins proxy ─────────────────────────────────────────────────
server {
    listen       443 ssl http2;
    listen       [::]:443 ssl http2;
    server_name  YOUR_DOMAIN_HERE;

    # ── TLS certificates (managed by certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # HSTS — 6 months, include subdomains, preload
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains; preload" always;

    # Content Security Policy — tighten for Jenkins
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Jenkins UI ────────────────────────────────────────────────────────────
    location /jenkins {
        proxy_pass         http://jenkins_backend/jenkins;
        proxy_http_version 1.1;

        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Port    $server_port;
        proxy_set_header   Connection          "";    # Enable keep-alive to upstream

        # Required for Jenkins websocket terminal (BlueOcean)
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          "upgrade";

        # Increase timeouts for long-running builds
        proxy_connect_timeout    90s;
        proxy_send_timeout       300s;
        proxy_read_timeout       300s;

        # Buffer settings — prevent Jenkins from hanging on slow clients
        proxy_request_buffering  off;
        proxy_buffering          off;

        # Disable size limit for artifact uploads
        client_max_body_size 0;
    }

    # ── GitHub Webhook endpoint — rate limited ────────────────────────────────
    location /jenkins/github-webhook/ {
        limit_req  zone=webhooks burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://jenkins_backend/jenkins/github-webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Deny access to Jenkins system paths ──────────────────────────────────
    location ~* /jenkins/(script|systemInfo|threadDump|heapDump) {
        deny all;
        return 403;
    }

    # ── Block common scanners ─────────────────────────────────────────────────
    location ~* \.(git|env|bak|sql|log)$ {
        deny all;
        return 404;
    }

    # ── Health check endpoint (for load balancers / uptime monitors) ─────────
    location /health {
        access_log off;
        return 200 'OK\n';
        add_header Content-Type text/plain;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        return 204;
    }
}
