# =============================================================================
# ForgeOps Platform — Loki Log Aggregation Configuration (Future Integration)
# Collect logs from Jenkins, Nginx, and application containers
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level:        warn

# ── Ingester ──────────────────────────────────────────────────────────────────
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period:      5m
  max_chunk_age:          1h
  chunk_target_size:      1048576
  chunk_retain_period:    30s

# ── Schema / storage ──────────────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store:    boltdb-shipper
      object_store: filesystem
      schema:   v11
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location:         /loki/boltdb-cache
    cache_ttl:              24h
    shared_store:           filesystem
  filesystem:
    directory: /loki/chunks

# ── Compactor ─────────────────────────────────────────────────────────────────
compactor:
  working_directory:  /loki/boltdb-shipper-compactor
  shared_store:       filesystem
  compaction_interval: 10m

# ── Limits ────────────────────────────────────────────────────────────────────
limits_config:
  # Conservative limits for Oracle Free Tier
  ingestion_rate_mb:       4
  ingestion_burst_size_mb: 6
  max_query_series:        500
  max_entries_limit_per_query: 5000
  retention_period:        720h   # 30 days

# ── Chunk cache ───────────────────────────────────────────────────────────────
chunk_store_config:
  max_look_back_period: 0s

# ── Table manager ─────────────────────────────────────────────────────────────
table_manager:
  retention_deletes_enabled: true
  retention_period:          720h

